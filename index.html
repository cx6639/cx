<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 我的自我介绍 ✨</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Comic Sans MS", "PingFang SC", "Microsoft Yahei", sans-serif;
        }

        /* 页面容器：固定 1920×1080 卡通背景 */
        .container {
            width: 1920px;
            height: 1080px;
            background: #ffecd2;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.5) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(135, 206, 250, 0.5) 0%, transparent 20%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px;
            gap: 60px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* 左侧头像区域（卡通化） */
        .avatar-section {
            flex: 1;
            text-align: center;
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            border: 5px solid #ffb6c1;
            box-shadow: 0 10px 0 #ff69b4;
        }

        .avatar {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid #fff;
            box-shadow: 0 8px 0 #ffb6c1;
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: rotate(5deg) scale(1.05);
        }

        .name {
            font-size: 52px;
            font-weight: bold;
            color: #ff69b4;
            margin-bottom: 15px;
            text-shadow: 3px 3px 0 #ffdab9;
        }

        .title {
            font-size: 30px;
            color: #4682b4;
            background: #e0f7fa;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
        }

        /* 右侧内容区域（卡通化） */
        .content-section {
            flex: 2;
            color: #2c3e50;
            background: #fff;
            padding: 50px;
            border-radius: 30px;
            border: 5px solid #87ceeb;
            box-shadow: 0 10px 0 #4682b4;
        }

        .section-title {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 25px;
            border-left: 10px solid #ffb6c1;
            padding-left: 15px;
            color: #ff69b4;
            text-shadow: 2px 2px 0 #ffdab9;
        }

        .intro-text {
            font-size: 24px;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #4682b4;
            background: #f0f8ff;
            padding: 20px;
            border-radius: 20px;
            border: 3px dashed #87ceeb;
        }

        .info-list {
            list-style: none;
            font-size: 24px;
            line-height: 2;
        }

        .info-list li {
            margin-bottom: 15px;
            background: #fffacd;
            padding: 10px 20px;
            border-radius: 15px;
            border: 3px solid #ffd700;
            transition: all 0.2s ease;
        }

        .info-list li:hover {
            transform: translateX(10px);
            background: #ffef96;
        }

        .info-list strong {
            color: #ff69b4;
            width: 120px;
            display: inline-block;
        }

        /* 卡通按钮 */
        .contact-btn {
            margin-top: 40px;
            padding: 18px 50px;
            font-size: 26px;
            font-weight: bold;
            background: #ff69b4;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #ff1493;
            transition: all 0.2s ease;
        }

        .contact-btn:hover {
            background: #ff1493;
            transform: translateY(-5px);
            box-shadow: 0 12px 0 #c71585;
        }

        .contact-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 0 #c71585;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧卡通头像区域 -->
        <div class="avatar-section">
            <img src="微信图片_20260311220524_67_2.jpg"alt="我的卡通头像">
            <h1 class="name">陈鑫</h1>
            <p class="title">🎉 摸鱼达人 🎉</p >
        </div>

        <!-- 右侧卡通内容区域 -->
        <div class="content-section">
            <h2 class="section-title">🌟 关于我 🌟</h2>
            <p class="intro-text">
                哈喽大家好～我是陈鑫，一个在大学里一边痛苦赶ddl一边寻找快乐的大学生～
            </p >

            <h2 class="section-title">📌 我的小档案 📌</h2>
            <ul class="info-list">
                <li><strong>音乐控：</strong>林俊杰的死忠粉！耳机里永远循环着他的歌，从抒情慢歌到动感快歌都能跟着唱，KTV里必点《修炼爱情》和《可惜没如果》！ </li>
                <li><strong>悬疑迷：</strong>重度烧脑片爱好者！最喜欢的小说家是东野圭吾，尤其爱看《白夜行》，有悬疑电影上线必看！</li>
                <li><strong>手游党：</strong>闲暇时间就泡在游戏里，不管是MOBA、养成还是解谜类都玩，是队友眼中“虽然菜但很乐观”的快乐搭子！</li>
                <li><strong>小技能：</strong>建模，剪辑视频，等等超标技能</li>
            </ul>

            <button class="contact-btn" id="contactBtn">👉 戳我聊天 👈</button>
        </div>
    </div>

    <script>
        // 可爱交互：点击按钮弹出卡通提示
        const contactBtn = document.getElementById('contactBtn');
        contactBtn.addEventListener('click', () => {
            alert('你好呀！欢迎来找我玩～可以通过各种社交平台认识我哦！');
        });

        // 额外小动画：页面加载时给头像加弹跳效果
        window.addEventListener('load', () => {
            const avatar = document.querySelector('.avatar');
            avatar.style.animation = 'bounce 0.6s ease';
        });

        // 定义弹跳动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-20px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
